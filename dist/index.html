      <h1>Nébula Sur: servicios locales y consultoría online en España</h1>
      <p>Nébula Sur ofrece electricidad, limpieza y mantenimiento físico en zona local, y servicios de IA aplicada, automatización, digitalización, formación y consultoría a distancia para empresas, autónomos, comunidades y particulares en toda España.</p>
      <h2>Servicios principales</h2>
      <ul>
        <li>IA aplicada y automatización de procesos online para empresas en España.</li>
        <li>Digitalización de operaciones y workflows internos a distancia.</li>
        <li>Formación, consultoría estratégica y auditoría operativa online.</li>
        <li>Electricidad local para negocios, viviendas, oficinas y comunidades.</li>
        <li>Limpieza profesional local para oficinas, locales y espacios de trabajo.</li>
        <li>Gestión, soporte y mantenimiento informático presencial o remoto según la intervención.</li>
      </ul>
      <h2>Zonas de servicio</h2>
      <p>Atendemos trabajos físicos en zona local, especialmente Granada, Málaga (Malaga) y zonas cercanas según disponibilidad. Los servicios digitales, formación, consultoría e IA se ofrecen online en toda España.</p>

      <p>Email: atencionalcliente@nebulasur.es. Teléfono: +34 655 309 861.</p>
